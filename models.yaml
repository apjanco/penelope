# SOC Analysis — Model Configuration
#
# Define one or more LLM profiles to run the same text through.
# Results from all models are combined in the output with a "model_label"
# column so you can compare classifications side-by-side.
#
# Each entry needs:
#   label      — short name used in output columns and filenames
#   base_url   — OpenAI-compatible API endpoint
#   model_name — model identifier sent in the API request
#   api_key    — API key (or reference an env var with ${ENV_VAR_NAME})
#
# Optional:
#   temperature — override default 0.1; use null for models that
#                 reject custom temperature (e.g. GPT-5)

models:
  - label: gpt-5
    base_url: https://api.portkey.ai/v1
    model_name: gpt-5
    api_key: ${PORTKEY_API_KEY}
    temperature: null  # GPT-5 only supports default temperature

  - label: Mistral-Large-2411
    base_url: https://api.portkey.ai/v1
    model_name: Mistral-Large-2411
    api_key: ${PORTKEY_API_KEY}
  
  - label: gemini-3-pro-preview
    base_url: https://api.portkey.ai/v1
    model_name: gemini-3-pro-preview
    api_key: ${PORTKEY_API_KEY}
  
  - label: Llama-3.3-70B-Instruct
    base_url: https://api.portkey.ai/v1
    model_name: Llama-3.3-70B-Instruct
    api_key: ${PORTKEY_API_KEY}
  
  - label: mercury-2
    base_url: https://api.inceptionlabs.ai/v1
    model_name: mercury-2
    api_key: ${INCEPTION_API_KEY}

  - label: qwen3-max
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen3-max
    api_key: ${DASHSCOPE_API_KEY}

  # Example: local model via Ollama / vLLM
  # - label: qwen3-8b
  #   base_url: http://localhost:11434/v1
  #   model_name: qwen3:8b
  #   api_key: not-needed

# Chunking defaults (can still be overridden by CLI flags)
chunk_size: 20000
chunk_overlap: 1000
